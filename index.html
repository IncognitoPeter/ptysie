<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Fiszki</title>
    <style>
        body {
            background-color: #333333;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .top-bar {
            width: 100%;
            background-color: #222222;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .top-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            position: relative;
        }
        .toggle-circle {
            width: 16px;
            height: 16px;
            background-color: #333333;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }
        .help-btn {
            background-color: #555555;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .home-btn {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .mode-selectors {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn {
            background-color: #555555;
            color: #aaaaaa;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .mode-btn.active {
            background-color: #666666;
            color: #ffffff;
        }
        .title-banner {
            background-color: #222222;
            padding: 10px 30px;
            border-radius: 4px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #444444;
        }
        .quiz-container {
            background-color: #444444;
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .option-item {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .option-item:hover {
            background-color: #666666;
        }
        .option-item.correct {
            background-color: #2e7d32 !important;
        }
        .option-item.wrong {
            background-color: #c62828 !important;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 25px;
        }
        .nav-button {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .counter-box {
            background-color: #222222;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .go-to-box {
            font-size: 14px;
            color: #cccccc;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .go-to-box input {
            background-color: #222222;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 4px;
            width: 50px;
            text-align: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <div class="toggle-switch"><div class="toggle-circle"></div></div>
        <button class="help-btn">?</button>
    </div>
    <button class="home-btn">Strona główna</button>
</div>

<div class="main-content">
    <div class="mode-selectors">
        <button class="mode-btn active" id="btn-learn" onclick="changeMode('learn')">Tryb nauki</button>
        <button class="mode-btn" id="btn-quiz" onclick="changeMode('quiz')">Tryb quizu</button>
    </div>

    <div class="title-banner">Menu - Fiszki</div>

    <div class="quiz-container">
        <div class="question-text" id="display-question">Ładowanie...</div>
        <div class="options-list" id="display-options"></div>
    </div>

    <div class="controls-row">
        <button class="nav-button" onclick="prevItem()">&lt; Poprzednie</button>
        <button class="nav-button" onclick="nextItem()">Następne &gt;</button>
    </div>

    <div class="counter-box" id="display-counter">Pytanie 1 z 1</div>
    
    <div class="go-to-box">
        Idź do pytania: <input type="number" id="input-index" onchange="goToItem(this.value)">
    </div>
</div>

<script>
const menu = [
    {n: "Grillowany ser górski z żurawiną i boczkiem", i: "Wędzony ser z mleka krowiego (smak zbliżony do oscypka). Plastry sera owijane boczkiem, przesmażane. Dodatek: żurawina marynowana.", a: "Mleko i produkty pochodne"},
    {n: "Śledź z cebulką i śmietaną", i: "Śledź po krakowsku, marynowany min. 12h w zalewie z octu, cukru, ziela angielskiego, liścia laurowego i warzyw. Zaprawa z cebuli, jabłka i jogurtu naturalnego. Układany na płacie ryby. Dodatki: jabłko, cebula czerwona, jajko.", a: "Jaja, Ryby, Mleko i produkty pochodne, Seler"},
    {n: "Polski węgorz wędzony", i: "Węgorz wędzony podawany na ciepło na grzance maślanej z ogórkiem, kwaśną śmietaną i kawiorem z łososia.", a: "Gluten, Ryby, Mleko i produkty pochodne"},
    {n: "Tatar wołowy", i: "Siekany, podwędzany dymem z jabłoni. Dodatki: cebula czerwona, ogórek konserwowy, pieczarka marynowana, olej z rukoli, szprotka, żółtko.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Deska polskich serów", i: "Sery: Lazur (pleśniowy), Bursztyn (dojrzewający min. 6 miesięcy), Koryciński (podpuszczkowy z mleka niepasteryzowanego), Bundz (wędzony, mleko krowie i owcze). Dodatki: owoce, orzechy, miód.", a: "Mleko i produkty pochodne, Orzechy"},
    {n: "Borowiki na maśle", i: "Borowiki smażone na maśle, natka pietruszki, czosnek, rozmaryn. Grzanka z półbagietki z parmezanem.", a: "Mleko i produkty pochodne, Orzechy"},
    {n: "Rosół z kury", i: "Gotowany na wiejskiej kurze bez ulepszaczy. Podawany z mięsem z kury, marchewką, natką i domowym makaronem.", a: "Gluten, Jaja, Seler"},
    {n: "Żurek", i: "Wywar z wędzonych kości i żeberek. Zakwas, cebula, boczek, kiełbasa, chrzan, majeranek, liść laurowy, ziele angielskie, suszone grzyby, jajka, śmietanka. Podawany w chlebie.", a: "Gluten, Jaja, Mleko i produkty pochodne, Seler"},
    {n: "Zupa borowikowa", i: "Zupa na suszonych grzybach i świeżych borowikach z dodatkiem bulionu i warzyw. Podawana w chlebie.", a: "Gluten, Mleko i produkty pochodne, Seler"},
    {n: "Zupa rybna", i: "Na pomidorach pelati, wywarze rybnym z ziołami prowansalskimi, fenkułem i harissą. Podawana ze szafranowym aioli (majonez czosnkowy). Kawałki łososia i sandacza.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Sałatka z wątróbką", i: "Wątróbka smażona w mące, na szpinaku z pomidorkami cherry. Dressing na bazie czerwonego wina, coulis malinowy, krem balsamiczny.", a: "Gluten, Mleko i produkty pochodne"},
    {n: "Sałatka z serem bundz", i: "Mix sałat z oliwkami, papryką, pomidorkami i cebulą czerwoną. Na to wędzony bundz. Dressing miodowo-cytrynowy.", a: "Jaja, Mleko i produkty pochodne, Gorczyca"},
    {n: "Sałata Cezar", i: "Sałata rzymska z grzankami, bekonem, plastrami kurczaka i płatkami parmezanu (Grana Padano). Sos Cezar na bazie majonezu z Anchois, limonki i parmezanu.", a: "Gluten, Jaja, Ryby, Mleko i produkty pochodne"},
    {n: "Pierogi z mięsem", i: "Farsz mięsny wieprzowo-wołowy.", a: "Gluten, Seler, Jaja"},
    {n: "Pierogi ruskie", i: "Farsz na bazie ziemniaków i twarogu tłustego.", a: "Gluten, Jaja, Mleko i przetwory pochodne, Seler"},
    {n: "Pierogi z kapustą", i: "Farsz na bazie pieczarek, kapusty białej i cebuli.", a: "Gluten, Jaja, Seler"},
    {n: "Kotlet schabowy", i: "Kotlet z kością, panierka to mix bułki tartej z panko. Podawany z puree ziemniaczanym z palonym masłem oraz kapustą zasmażaną.", a: "Gluten, Jaja, Gorczyca, Seler, Mleko i produkty pochodne"},
    {n: "Filet z kaczki", i: "Gotowana sous-vide w 54°C (standardowo medium). Podawana z gratin ziemniaczaną, świeżymi ziołami (rozmaryn, tymianek), sosem jabłkowym na bazie demi glace i warzywami.", a: "Brak"},
    {n: "Maczanka po krakowsku", i: "Bułka ziemniaczana, karczek wieprzowy długo duszony z sosem kminkowym na bazie demi glace. Dodatki: ogórek kiszony, marmolada z czerwonej cebuli i pieczarki.", a: "Gluten, Jaja, Gorczyca, Seler, Soja, Nasiona sezamu"},
    {n: "Sztuka mięsa", i: "Pręga wołowa długo duszona w bulionie wołowym. Sos chrzanowy na bazie białego wina i śmietany, wywar spod pręgi. Puree, marchewka, dziki brokuł, groszek cukrowy, pomidorki cherry na ciepło.", a: "Mleko i produkty pochodne"},
    {n: "Okoń morski w bulionie", i: "Okoń smażony na maśle, cukinia, marchewka gotowana w bulionie rybnym szafranowym. Dodatki: ziemniaki opiekane, sianko z pora.", a: "Ryby, Mleko"},
    {n: "Pstrąg", i: "Ryba słodkowodna, przesmażona ze świeżymi ziołami i cytryną. Podawana z małym mixem sałat i opiekanymi ziemniakami.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Makaron penne z kurczakiem", i: "Świeży makaron, kurczak, suszone pomidory i szpinak w sosie śmietanowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Spaghetti carbonara", i: "Świeży makaron, przesmażona pancetta (włoski boczek) zwinięta w rulon, parmezan, żółtko.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Spaghetti pomodoro", i: "Świeży makaron z klasycznym sosem pomidorowym i parmezanem.", a: "Gluten, Jaja, Mleko i produkty pochodne, Seler"},
    {n: "Burger wołowy", i: "Bułka brioszka, mięso wołowe, sałata, ogórek konserwowy, cebula czerwona, ser cheddar, sos barbecue. W zestawie frytki i ketchup.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Kotleciki jagnięce", i: "Smażone w ząbkach czosnku, w towarzystwie szparagów. Stopień MEDIUM RARE. Podawane z ziemniakami opiekanymi i pieczonymi.", a: "Brak"},
    {n: "Filet z kurczaka kukurydzianego", i: "Filet z kostką sous-vide. Podawany na sałatce z koprem włoskim, rukolą, cebulą czerwoną, pomarańczą. Sos tymiankowy na bazie białego wina i śmietanki.", a: "Gluten, Mleko i produkty pochodne, Seler, Gorczyca"},
    {n: "Polędwica wołowa", i: "Polska wołowina. Wyjściowy stopień wysmażenia to MEDIUM. Dodatki gość dobiera osobno.", a: "Brak"},
    {n: "Antrykot wołowy", i: "Antrykot brazylijski. Wyjściowy stopień wysmażenia to MEDIUM. Dodatki gość dobiera osobno.", a: "Brak"},
    {n: "Kanapka klubowa", i: "Ciabatta, sos musztardowo-miodowy z tymiankiem, konfitura z czerwonej cebuli, sałata, pomidor, antrykot z grilla (medium). W zestawie frytki i pomidorki koktajlowe.", a: "Gluten, Gorczyca"},
    {n: "Sernik krakowski", i: "Pieczony na kruchym ciastku ze śmietanką i cukrem waniliowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Fondant czekoladowy", i: "Z płynnym wnętrzem, podawany z coulis malinowym i świeżymi owocami.", a: "Gorczyca, Sezam, Mleko, Orzechy, Seler, Gluten, Soja, Jaja"},
    {n: "Crème Brûlée", i: "Waniliowy deser z opalanym cukrem trzcinowym.", a: "Mleko i produkty pochodne, Jaja"},
    {n: "Puchar owocowy", i: "Sorbet malinowy, sorbet cytrynowy, sorbet mango. Świeże owoce, rurka.", a: "Gluten, Mleko i produkty pochodne, Jaja"},
    {n: "Banana split", i: "Dwie gałki lodów czekoladowych, jedna gałka waniliowych, banan, rurka, bita śmietana.", a: "Gluten, Mleko i produkty pochodne, Jaja"},
    {n: "Puchar Juniora", i: "Jedna gałka lodów 'kaktus', jedna gałka gumy balonowej, M&M'sy, w misiu waflowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Śniadanie polskie", i: "Bułka kajzerka, jajecznica z 3 jaj, 2x eko kiełbaski, mix sałat.", a: "Gluten, Jaja, Gorczyca, Mleko i produkty pochodne"},
    {n: "Śniadanie angielskie", i: "Bułka kajzerka, kaszanka, fasolka w sosie pomidorowym, jaja sadzone, pieczarki, pomidor, eko kiełbaski.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Jaja po benedyktyńsku", i: "Bułka, rukola, szynka, szparagi zielone, jaja poche (w koszulce), sos holenderski.", a: "Gluten, Jaja, Mleko i produkty pochodne"}
];

let currentIndex = 0;
let currentMode = 'learn';
let userSelected = false;

function updateUI() {
    userSelected = false;
    const current = menu[currentIndex];
    
    document.getElementById('display-counter').innerText = `Pytanie ${currentIndex + 1} z ${menu.length}`;
    document.getElementById('input-index').value = currentIndex + 1;
    
    const questionEl = document.getElementById('display-question');
    const optionsEl = document.getElementById('display-options');
    optionsEl.innerHTML = '';

    if (currentMode === 'learn') {
        questionEl.innerText = `${current.n}:`;
        
        const btn = document.createElement('button');
        btn.className = 'option-item';
        btn.innerText = "Kliknij, aby zobaczyć skład i alergeny";
        btn.onclick = () => {
            btn.style.display = 'none';
            
            const infoText = document.createElement('div');
            infoText.style.textAlign = 'left';
            infoText.style.lineHeight = '1.5';
            infoText.innerHTML = `<strong>Skład:</strong> ${current.i}<br><br><span style="color:#fca5a5"><strong>Alergeny:</strong> ${current.a}</span>`;
            optionsEl.appendChild(infoText);
        };
        optionsEl.appendChild(btn);
    } else {
        questionEl.innerText = `Jakie składniki i dodatki zawiera potrawa: "${current.n}"?`;
        
        let answers = [current.i];
        while (answers.length < Math.min(4, menu.length)) {
            let rand = menu[Math.floor(Math.random() * menu.length)].i;
            if (!answers.includes(rand)) answers.push(rand);
        }
        answers.sort(() => Math.random() - 0.5);
        
        answers.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'option-item';
            btn.innerText = ans;
            btn.onclick = () => {
                if (userSelected) return;
                userSelected = true;
                if (ans === current.i) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    Array.from(optionsEl.children).forEach(b => {
                        if (b.innerText === current.i) b.classList.add('correct');
                    });
                }
            };
            optionsEl.appendChild(btn);
        });
    }
}

function changeMode(mode) {
    currentMode = mode;
    document.getElementById('btn-learn').classList.toggle('active', mode === 'learn');
    document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
    updateUI();
}

function nextItem() {
    if (currentIndex < menu.length - 1) {
        currentIndex++;
        updateUI();
    }
}

function prevItem() {
    if (currentIndex > 0) {
        currentIndex--;
        updateUI();
    }
}

function goToItem(val) {
    let idx = parseInt(val) - 1;
    if (idx >= 0 && idx < menu.length) {
        currentIndex = idx;
        updateUI();
    }
}

updateUI();
</script>
</body>
</html>
